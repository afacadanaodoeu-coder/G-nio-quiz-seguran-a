<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gênio Quiz - Criptografia & Segurança</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #E6E6E6;
            font-family: "Arial", sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 850px;
            height: 600px;
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* --- TELA INICIAL --- */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .main-title {
            font-size: 52px;
            font-weight: 900;
            color: #000;
            margin-bottom: 5px;
            letter-spacing: -2px;
        }
        .subtitle {
            font-size: 22px;
            font-weight: bold;
            color: #444;
            margin-bottom: 25px;
        }
        .brain-container {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }
        .robot-brain {
            font-size: 75px;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        .robot-brain:nth-child(2) { animation-delay: 1.5s; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .start-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .mode-selection {
            display: flex;
            gap: 20px;
            margin-bottom: 5px;
        }
        .btn-mode {
            width: 180px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #000;
            border-radius: 4px;
            background-color: #FFF;
            color: #000;
            transition: 0.1s;
        }
        .btn-mode.easy:hover {
            background-color: #4CAF50;
            color: #FFF;
        }
        .btn-mode.genio:hover {
            background-color: #E60000;
            color: #FFF;
        }
        .btn-start {
            width: 280px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            background-color: #FFF;
            border: 2px dashed #888;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-start:hover {
            background-color: #000;
            color: #FFF;
            border-style: solid;
        }
        .fake-small-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 12px;
            color: #777;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- TELA DE JOGO --- */
        #quiz-screen {
            display: none;
            width: 100%;
        }
        #header-info {
            font-size: 26px;
            font-weight: bold;
            color: #222;
            margin-bottom: 20px;
        }
        #question-title {
            font-size: 25px;
            font-weight: bold;
            color: #000;
            margin-bottom: 35px;
            padding: 0 50px;
            min-height: 80px;
            line-height: 1.3;
        }
        #options-area {
            width: 100%;
        }
        .btn-option {
            display: block;
            width: 380px;
            background-color: #FFF;
            border: 2px solid #000;
            padding: 13px;
            margin: 10px auto;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            color: #000;
        }
        .btn-option:hover {
            background-color: #000;
            color: #FFF;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 520px;
            margin: 0 auto;
            gap: 15px;
        }
        .btn-grid {
            background-color: #FFF;
            border: 2px solid #000;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn-grid:hover {
            background-color: #000;
            color: #FFF;
        }
        .secret-click {
            cursor: pointer;
        }
        .secret-click:hover {
            color: #00F;
        }

        /* --- TELAS DE INTERFACE --- */
        #fail-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FF3333;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: bold;
            z-index: 10;
        }
        #fail-screen button {
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #000;
            background-color: #FFF;
        }
        
        /* TELA DE VITÓRIA COM TROFÉU */
        #win-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #3b7ad6;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            animation: bg-dance 0.8s linear infinite;
        }
        @keyframes bg-dance {
            0%, 100% { background-color: #2c62b5; }
            50% { background-color: #4a8ff0; }
        }
        .trophy {
            font-size: 110px;
            margin-bottom: 10px;
            animation: bounce 1s ease-in-out infinite alternate;
        }
        @keyframes bounce {
            0% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1.1) rotate(5deg); }
        }
        .win-txt {
            font-size: 48px;
            font-weight: 900;
            text-shadow: 3px 3px #000;
            margin-bottom: 5px;
        }
        .win-sub {
            font-size: 22px;
            font-weight: bold;
            text-shadow: 1px 1px #000;
        }
        #credits {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 13px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <!-- TELA INICIAL -->
        <div id="start-screen">
            <div class="main-title">Gênio Quiz</div>
            <div class="subtitle">Criptografia & Segurança</div>
            
            <div class="brain-container">
                <div class="robot-brain">🧠🤖</div>
                <div class="robot-brain">🧠🔒</div>
            </div>

            <div class="start-menu">
                <div class="mode-selection">
                    <button class="btn-mode easy" onclick="selectMode('easy')">Modo Fácil</button>
                    <button class="btn-mode genio" onclick="selectMode('genio')">Modo Gênio</button>
                </div>
                <button class="btn-start" onclick="fail()">Créditos & Instruções</button>
            </div>
            
            <div class="fake-small-btn" onclick="fail()">v52.0.1</div>
        </div>

        <!-- TELA DO QUIZ -->
        <div id="quiz-screen">
            <div id="header-info">questão <span id="q-num">1</span></div>
            <div id="question-title">Carregando pergunta...</div>
            <div id="options-area"></div>
        </div>

        <!-- TELA DE ERRO -->
        <div id="fail-screen">
            VOCÊ ERROU!
            <button onclick="restartGame()">Começar do Novo</button>
        </div>

        <!-- TELA DE VITÓRIA COM TROFÉU -->
        <div id="win-screen">
            <div class="trophy">🏆</div>
            <div class="win-txt">parabéns, você venceu</div>
            <div class="win-sub" id="victory-sub">Você completou o desafio com maestria!</div>
        </div>
    </div>

    <div id="credits">André Birnfeld style creation</div>

    <script>
        let currentQuestion = 1;
        let gameMode = 'genio'; // 'easy' ou 'genio'
        let totalQuestions = 50;

        function selectMode(mode) {
            gameMode = mode;
            totalQuestions = (mode === 'easy') ? 20 : 50;
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "block";
            currentQuestion = 1;
            loadQuestion();
        }

        function fail() {
            document.getElementById("fail-screen").style.display = "flex";
        }

        function next() {
            if (currentQuestion >= totalQuestions) {
                // VITÓRIA
                document.getElementById("quiz-screen").style.display = "none";
                const subTxt = document.getElementById("victory-sub");
                subTxt.textContent = `Você completou as ${totalQuestions} questões no ${gameMode === 'easy' ? 'Modo Fácil' : 'Modo Gênio'}!`;
                document.getElementById("win-screen").style.display = "flex";
            } else {
                currentQuestion++;
                loadQuestion();
            }
        }

        function restartGame() {
            document.getElementById("fail-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("win-screen").style.display = "none";
            document.getElementById("start-screen").style.display = "flex";
        }

        function moveButton() {
            const btn = document.getElementById("runaway-btn");
            if(btn) {
                btn.style.left = (Math.random() * 160 - 80) + "px";
                btn.style.top = (Math.random() * 40 - 20) + "px";
            }
        }

        function loadQuestion() {
            const titleEl = document.getElementById("question-title");
            const numEl = document.getElementById("q-num");
            const areaEl = document.getElementById("options-area");
            
            numEl.textContent = currentQuestion;
            numEl.className = "";
            numEl.onclick = null;
            titleEl.onclick = null;

            // Mapeador de ID de questão baseado no modo de jogo escolhido
            let qId = currentQuestion;
            
            if (gameMode === 'easy') {
                // No modo fácil, mapeamos as 20 questões diretas tirando os cliques ocultos mais complexos
                const easyMap = [1, 3, 4, 6, 7, 8, 9, 11, 13, 14, 15, 17, 18, 20, 21, 22, 24, 26, 27, 28];
                qId = easyMap[currentQuestion - 1];
            }

            // REPOSITÓRIO DINÂMICO DE QUESTÕES
            switch(qId) {
                case 1:
                    titleEl.innerHTML = "Qual protocolo garante que a comunicação com o site é estritamente criptografada?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">HTTP</div>
                        <div class="btn-option" onclick="fail()">HTML</div>
                        <div class="btn-option" onclick="next()">HTTPS</div>
                        <div class="btn-option" onclick="fail()">FTP</div>`;
                    break;
                case 2: // Pegadinha Gênio: Clicar na palavra Criptografia
                    titleEl.innerHTML = "Clique na <span id='secret' class='secret-click'>Criptografia</span> para descriptografar:";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Chave Privada</div>
                        <div class="btn-option" onclick="fail()">Algoritmo AES</div>
                        <div class="btn-option" onclick="fail()">Força Bruta</div>
                        <div class="btn-option" onclick="fail()">Texto Claro</div>`;
                    document.getElementById("secret").onclick = next;
                    break;
                case 3:
                    titleEl.innerHTML = "Qual das seguintes alternativas NÃO é um software malicioso (Malware)?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Ransomware</div>
                        <div class="btn-option" onclick="fail()">Spyware</div>
                        <div class="btn-option" onclick="next()">Phishing</div>
                        <div class="btn-option" onclick="fail()">Trojan</div>`;
                    break;
                case 4:
                    titleEl.innerHTML = "A autenticação de dois fatores (2FA) torna sua conta 100% invulnerável?";
                    areaEl.innerHTML = `<div class="options-grid"><button class="btn-grid" onclick="fail()">Sim</button><button class="btn-grid" onclick="next()">Não</button></div>`;
                    break;
                case 5: // Pegadinha Gênio: Clicar no número da questão no cabeçalho
                    numEl.className = "secret-click";
                    numEl.onclick = next;
                    titleEl.innerHTML = "Quantas chaves secretas exclusivas são necessárias para 4 pessoas conversarem via criptografia simétrica?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">4</div>
                        <div class="btn-option" onclick="fail()">6</div>
                        <div class="btn-option" onclick="fail()">1</div>
                        <div class="btn-option" onclick="fail()">8</div>`;
                    break;
                case 6:
                    titleEl.innerHTML = "Se você usar a Cifra de César deslocando 26 posições no alfabeto A-Z, o resultado é:";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="next()">O texto original idêntico</div>
                        <div class="btn-option" onclick="fail()">Criptografia militar inquebrável</div>
                        <div class="btn-option" onclick="fail()">O texto de trás para frente</div>
                        <div class="btn-option" onclick="fail()">Um código sem nenhuma vogal</div>`;
                    break;
                case 7:
                    titleEl.innerHTML = "O que um hacker lê ao interceptar um hash criptográfico SHA-256 de uma senha?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">A senha original decifrada</div>
                        <div class="btn-option" onclick="fail()">A metade da senha</div>
                        <div class="btn-option" onclick="next()">Uma sequência fixa de caracteres ilegíveis</div>
                        <div class="btn-option" onclick="fail()">A chave privada do usuário</div>`;
                    break;
                case 8:
                    titleEl.innerHTML = "Um 'Zero-Day' (Dia Zero) representa:";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Um vírus que destrói o PC em 24h</div>
                        <div class="btn-option" onclick="next()">Uma falha sem correção disponível pelo criador</div>
                        <div class="btn-option" onclick="fail()">O dia em que a internet foi criada</div>
                        <div class="btn-option" onclick="fail()">Uma senha com nível zero de segurança</div>`;
                    break;
                case 9:
                    titleEl.innerHTML = "Qual vírus se propaga de forma automática por redes sem precisar da execução do usuário?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Cavalo de Troia</div>
                        <div class="btn-option" onclick="next()">Worm (Verme)</div>
                        <div class="btn-option" onclick="fail()">Spyware</div>
                        <div class="btn-option" onclick="fail()">Keylogger</div>`;
                    break;
                case 10: // Pegadinha Gênio: Botão esquivo
                    titleEl.innerHTML = "Ataque 'Man-in-the-Middle' consiste em:";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Ficar olhando a tela do colega ao lado</div>
                        <div class="btn-option" onclick="fail()">Bloquear servidores com acessos falsos</div>
                        <div class="btn-option" id="runaway-btn" onmouseover="moveButton()" onclick="next()" style="position:relative;">Interceptar e alterar comunicações</div>
                        <div class="btn-option" onclick="fail()">Criar uma IA que adivinha senhas</div>`;
                    break;
                case 11:
                    titleEl.innerHTML = "Para que serve um 'Sal' (Salt) na criptografia de senhas?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="next()">Adicionar dados aleatórios antes do hash para evitar Rainbow Tables</div>
                        <div class="btn-option" onclick="fail()">Deixar os servidores de internet mais rápidos</div>
                        <div class="btn-option" onclick="fail()">Corroer o código dos arquivos maliciosos</div>
                        <div class="btn-option" onclick="fail()">Limpar cookies infectados do navegador</div>`;
                    break;
                case 12: // Pegadinha Gênio
                    document.getElementById("credits").className = "secret-click";
                    document.getElementById("credits").onclick = function() {
                        document.getElementById("credits").className = "";
                        document.getElementById("credits").onclick = null;
                        next();
                    };
                    titleEl.innerHTML = "Clique no elemento de Segurança definitivo deste painel:";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Antivírus Atualizado</div>
                        <div class="btn-option" onclick="fail()">Firewall de Borda</div>
                        <div class="btn-option" onclick="fail()">Biometria Facial</div>
                        <div class="btn-option" onclick="fail()">Criptografia AES</div>`;
                    break;
                case 13:
                    titleEl.innerHTML = "Qual o tamanho de bits da chave do algoritmo AES considerado padrão de alta segurança mundial?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">32 bits</div>
                        <div class="btn-option" onclick="fail()">64 bits</div>
                        <div class="btn-option" onclick="fail()">128 bytes</div>
                        <div class="btn-option" onclick="next()">256 bits</div>`;
                    break;
                case 14:
                    titleEl.innerHTML = "O ataque DDOS tem o objetivo principal de:";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Roubar as senhas de administradores</div>
                        <div class="btn-option" onclick="next()">Esgotar recursos e derrubar a disponibilidade do sistema</div>
                        <div class="btn-option" onclick="fail()">Criptografar arquivos pedindo resgate</div>
                        <div class="btn-option" onclick="fail()">Infiltrar escutas na rede Wi-Fi</div>`;
                    break;
                case 15:
                    titleEl.innerHTML = "O que a Criptografia Assimétrica usa para funcionar?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Uma única chave secreta compartilhada</div>
                        <div class="btn-option" onclick="next()">Um par de chaves: uma pública e uma privada</div>
                        <div class="btn-option" onclick="fail()">Três senhas idênticas criadas em sequência</div>
                        <div class="btn-option" onclick="fail()">Uma chave de deslocamento numérico simples</div>`;
                    break;
                case 16:
                    titleEl.innerHTML = "Qual termo define o resgate financeiro exigido no ataque de Ransomware?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Bitcoin Pay</div>
                        <div class="btn-option" onclick="fail()">Phishing Tax</div>
                        <div class="btn-option" onclick="fail()">Malware Token</div>
                        <div class="btn-option" onclick="next()">Ransom</div>`;
                    break;
                case 17:
                    titleEl.innerHTML = "O que faz um Keylogger?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="next()">Registra todas as teclas digitadas pelo usuário</div>
                        <div class="btn-option" onclick="fail()">Gera chaves criptográficas indestrutíveis</div>
                        <div class="btn-option" onclick="fail()">Bloqueia acessos não autorizados em portas lógicas</div>
                        <div class="btn-option" onclick="fail()">Modifica o registro do Windows acionando travas</div>`;
                    break;
                case 18:
                    titleEl.innerHTML = "Qual o elo considerado mais fraco em qualquer arquitetura de segurança moderna?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">O cabo de rede</div>
                        <div class="btn-option" onclick="next()">O ser humano</div>
                        <div class="btn-option" onclick="fail()">O banco de dados</div>
                        <div class="btn-option" onclick="fail()">O roteador Wi-Fi</div>`;
                    break;
                case 19: // Pegadinha Gênio
                    titleEl.innerHTML = "Clique no ponto de vulnerabilidade crítica do sistema<span id='dot' class='secret-click' style='color:red;font-weight:bold;'>.</span>";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Porta 80 aberta</div>
                        <div class="btn-option" onclick="fail()">Kernel Desatualizado</div>
                        <div class="btn-option" onclick="fail()">Ausência de DMZ</div>
                        <div class="btn-option" onclick="fail()">Buffer Overflow</div>`;
                    document.getElementById("dot").onclick = next;
                    break;
                case 20:
                    titleEl.innerHTML = "A técnica 'Spoofing' refere-se a:";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Quebra de senhas por dicionário de palavras</div>
                        <div class="btn-option" onclick="next()">Falsificação de identidades (IP, e-mail) para enganar redes</div>
                        <div class="btn-option" onclick="fail()">Destruição física de discos rígidos</div>
                        <div class="btn-option" onclick="fail()">Monitoramento passivo de tráfego de dados</div>`;
                    break;
                case 21:
                    titleEl.innerHTML = "O que significa a sigla VPN?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="next()">Virtual Private Network</div>
                        <div class="btn-option" onclick="fail()">Virus Protected Node</div>
                        <div class="btn-option" onclick="fail()">Variable Password Number</div>
                        <div class="btn-option" onclick="fail()">Verified Privacy Network</div>`;
                    break;
                case 22:
                    titleEl.innerHTML = "Se uma mensagem cifrada assíncrona foi trancada com a chave pública do Bob, quem consegue ler?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Qualquer um que possua a mesma chave pública</div>
                        <div class="btn-option" onclick="fail()">O remetente original que enviou a mensagem</div>
                        <div class="btn-option" onclick="next()">Apenas o Bob com sua própria chave privada</div>
                        <div class="btn-option" onclick="fail()">O provedor que intermediou a conexão de dados</div>`;
                    break;
                case 23:
                    titleEl.innerHTML = "A criptografia simétrica é nativamente mais rápida que a assimétrica?";
                    areaEl.innerHTML = `<div class="options-grid"><button class="btn-grid" onclick="next()">Sim</button><button class="btn-grid" onclick="fail()">Não</button></div>`;
                    break;
                case 24:
                    titleEl.innerHTML = "Qual ataque se aproveita de falhas de sanitização em formulários de sites para injetar comandos SQL malignos?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">XSS</div>
                        <div class="btn-option" onclick="next()">SQL Injection</div>
                        <div class="btn-option" onclick="fail()">Brute Force</div>
                        <div class="btn-option" onclick="fail()">Rootkit</div>`;
                    break;
                case 25: // Pegadinha Gênio
                    titleEl.innerHTML = "Clique no valor que indica 50% de conclusão deste quiz:";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Questão Atual</div>
                        <div class="btn-option" onclick="fail()">50</div>
                        <div class="btn-option" onclick="fail()">Metade</div>
                        <div class="btn-option" onclick="fail()">0.5</div>`;
                    numEl.className = "secret-click";
                    numEl.onclick = next;
                    break;
                case 26:
                    titleEl.innerHTML = "O que faz um Rootkit no sistema?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Acelera o processador para queimar os chips</div>
                        <div class="btn-option" onclick="next()">Esconde a presença de malwares e acessos administrativos</div>
                        <div class="btn-option" onclick="fail()">Altera o idioma dos navegadores nativos</div>
                        <div class="btn-option" onclick="fail()">Exibe anúncios popup piscantes na área de trabalho</div>`;
                    break;
                case 27:
                    titleEl.innerHTML = "Qual dessas NÃO é uma função hash recomendada para senhas modernas?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Bcrypt</div>
                        <div class="btn-option" onclick="next()">MD5</div>
                        <div class="btn-option" onclick="fail()">Argon2</div>
                        <div class="btn-option" onclick="fail()">PBKDF2</div>`;
                    break;
                case 28:
                    titleEl.innerHTML = "O que é Engenharia Social?";
                    areaEl.innerHTML = `
                        <div class="btn-option" onclick="fail()">Montar servidores redundantes em salas isoladas</div>
                        <div class="btn-option" onclick="fail()">Programar inteligências artificiais com ética avançada</div>
                        <div class="btn-option" onclick="next()">Manipular psicologicamente pessoas para obter segredos</div>
                        <div class="btn-option" onclick="fail()">Criar regras de firewall baseadas em cargos da empresa</div>`;
                    break;
